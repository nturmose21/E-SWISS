<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-SWISS Installer</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 520px);
        border: 2px solid #fff;
        border-radius: 12px;
        padding: 28px;
        background: #050505;
        box-shadow: 0 18px 60px rgb(255 255 255 / 8%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: #cfcfcf;
        line-height: 1.5;
      }

      esp-web-install-button {
        display: block;
        margin-top: 24px;
      }

      .note {
        margin-top: 18px;
        font-size: 13px;
        color: #aaa;
      }
    </style>
    <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
  </head>
  <body>
    <main>
      <h1>E-SWISS Installer</h1>
      <p>Plug in the Seeed XIAO ESP32-C3, open this page in Chrome or Edge, then click install.</p>
      <esp-web-install-button manifest="manifest.json"></esp-web-install-button>
      <p class="note">Use a data-capable USB cable. Hold BOOT while connecting if the browser cannot find the device.</p>
    </main>
  </body>
</html>
